
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <section aria-label="profile-selection">
            <button id="themeToggle" aria-label="Alternar modo claro/escuro">Modo claro</button>
            <h1>Quem está assistindo?</h1>
            <nav class="profiles">
                <ul>
                    <li>
                        <a href="catalogo/catalogo.html" class="profile">
                            <figure>
                                <img src="/assets/perfil-1.jpg" alt="Imagem de perfil.">
                                <figcaption>Lilly</figcaption>
                            </figure>
                        </a>
                    </li>
                    <li>
                        <a href="catalogo/catalogo.html" class="profile">
                            <figure>
                                <img src="/assets/perfil-2.jpg" alt="Imagem de perfil.">
                                <figcaption>Mitty</figcaption>
                            </figure>
                        </a>
                    </li>
                    <li>
                        <a href="catalogo/catalogo.html" class="profile">
                            <figure>
                                <img src="/assets/perfil-1.jpg" alt="Imagem de perfil.">
                                <figcaption>Outro</figcaption>
                            </figure>
                        </a>
                    </li>
                    <li>
                        <a href="catalogo/catalogo.html" class="profile">
                            <figure>
                                <img src="/assets/perfil-2.jpg" alt="Imagem de perfil.">
                                <figcaption>Mais Um</figcaption>
                            </figure>
                        </a>
                    </li>
                </ul>
            </nav>
        </section>
    </main>
    <script>
        const toggle = document.getElementById('themeToggle');
        const body = document.body;

        function updateThemeButton() {
            if (body.classList.contains('light-theme')) {
                toggle.textContent = '🌙 Modo escuro';
            } else {
                toggle.textContent = '☀️ Modo claro';
            }
        }

        toggle.addEventListener('click', () => {
            body.classList.toggle('light-theme');
            updateThemeButton();
        });

        updateThemeButton();

        // Armazenar perfil ativo no localStorage
        const profiles = document.querySelectorAll('.profile');
        profiles.forEach(profile => {
            profile.addEventListener('click', () => {
                const img = profile.querySelector('img');
                const name = profile.querySelector('figcaption').textContent;
                localStorage.setItem('perfilAtivoNome', name);
                localStorage.setItem('perfilAtivoImagem', img.src);
            });
        });
    </script>
</body>
</body>
</html>
